<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Pokémon Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="screen-content">
            <h1>🎮 Pokémon Guessing Game</h1>
            <p>Can you guess 20 Pokémon in one round?</p>
            <p>Includes Mega Evolutions!</p>
            <button onclick="startGame()" class="btn btn-primary">Start Game</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="game-container">
            <div class="header">
                <div class="question-info">Question <span id="questionNumber">1</span>/20</div>
                <div class="score">Score: <span id="currentScore">0</span>/100</div>
            </div>

            <div class="game-content">
                <img id="pokemonImage" src="" alt="Pokémon" class="pokemon-image">

                <div class="guess-section">
                    <input
                        type="text"
                        id="guessInput"
                        placeholder="Enter Pokémon name..."
                        onkeypress="handleKeyPress(event)"
                        autocomplete="off"
                    >
                    <button onclick="submitGuess()" class="btn btn-submit">Submit</button>
                    <button onclick="skipQuestion()" class="btn btn-skip">Skip</button>
                </div>

                <div id="feedbackMessage" class="feedback-message"></div>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="screen">
        <div class="screen-content">
            <h1>🏆 Game Over!</h1>
            <div class="final-score">
                <p>Your Score:</p>
                <h2><span id="finalScore">0</span>/100</h2>
            </div>
            <div id="ratingText" class="rating-text"></div>
            <button onclick="location.reload()" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
